<style>
  @font-face {
    font-family: 'Press Start 2P';
    src: url('fonts/PressStart2P-Regular.ttf') format('truetype');

    font-style: normal;
    font-display: swap;
  }
  @font-face {

    src: url('fonts/ShareTechMono-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

    --border:      #1e2a1e;
    --accent:      #00ff88;
    --accent2:     #ff6b35;
    --dim:         #2a3a2a;
    --text:        #c8d8c8;

    min-height: 100vh;

  body::before {

      rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px

    pointer-events: none; z-index: 9999;

  header {

    overflow: hidden;
    padding: 1.5rem 2rem 1rem;

    box-shadow: var(--neon-glow);

  #gol-canvas {

    height: 100%;

    text-shadow: var(--orange-glow); line-height:1; min-width:4ch;

    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.9rem,2vw,1.4rem);

    box-shadow: 0 4px 20px #0a0c1099;

  button.fb.active { background:rgba(0,255,136,0.07); border-color:var(--accent); color:var(--accent); box-shadow:var(--neon-glow); }

  button.fb[data-f="mystery"].active   { border-color:#77ddaa; color:#77ddaa; background:rgba(119,221,170,0.07); }
  button.fb[data-f="rpg"].active       { border-color:#ffaa55; color:#ffaa55; background:rgba(255,170,85,0.07); }

// в”Җв”Җ CSV PARSER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function parseCSV(text) {
  // Normalize line endings (handles \r\n and \r)
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const fields = [];
    let cur = '', inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if      (ch === '"' && !inQ) { inQ = true; }
      else if (ch === '"' &&  inQ) { inQ = false; }
      else if (ch === ',' && !inQ) { fields.push(cur); cur = ''; }
      else                         { cur += ch; }
    }
    fields.push(cur);
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (fields[idx] || '').trim());
    // only add if title is non-empty (guards against ghost rows)
    if (obj.title) rows.push(obj);
  }
  return rows;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// в”Җв”Җ APPLY I18N в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function applyLang() {
  const t = I18N[lang];
  const fp = document.getElementById('footer-privacy');
  if (fp) fp.innerHTML = t.privacy;
  document.getElementById('lbl-filter').textContent    = t.filterLabel;
  document.getElementById('fb-all').textContent        = t.allBtn;
  document.getElementById('search').placeholder        = t.searchPh;
  document.getElementById('th-year').innerHTML         = t.thYear  + '<span class="si">&#8597;</span>';
  document.getElementById('th-title').innerHTML        = t.thTitle + '<span class="si">&#8597;</span>';
  document.getElementById('th-type').textContent       = t.thType;
  document.getElementById('th-dev').textContent        = t.thDev;
  document.getElementById('th-pub').textContent        = t.thPub;
  document.getElementById('th-country').textContent    = t.thCountry;
  document.getElementById('th-notes').textContent      = t.thNotes;
  document.getElementById('langBtn').innerHTML         = t.langBtn;
  document.getElementById('nores').textContent         = t.noResults;
  document.getElementById('loading').textContent       = t.loading;
  // restore sorted indicator
  const sortedTh = document.querySelector(`thead th[data-col="${sortCol}"]`);
  if (sortedTh) {
    sortedTh.classList.add('sorted');
    const si = sortedTh.querySelector('.si');
    if (si) si.innerHTML = sortDir === 1 ? '&#8595;' : '&#8593;';
  }
}

// в”Җв”Җ RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function render() {
  const q = query.toLowerCase();

  const filtered = allGames.filter(g => {
    const tags = g.tags ? g.tags.split(',').map(t => t.trim()) : [];
    if (activeFilter === 'star')  return g.star === 'true';
    if (activeFilter !== 'all')   return tags.includes(activeFilter);
    return true;
  }).filter(g => {
    if (!q) return true;
    return g.title.toLowerCase().includes(q)   ||
           (g.note      || '').toLowerCase().includes(q) ||
           (g.tags      || '').toLowerCase().includes(q) ||
           (g.genre     || '').toLowerCase().includes(q) ||
           (g.developer || '').toLowerCase().includes(q) ||
           (g.publisher || '').toLowerCase().includes(q) ||
           String(g.year).includes(q);
  });

  const sorted = [...filtered].sort((a, b) => {
    if (sortCol === 'year')  return sortDir * (Number(b.year)  - Number(a.year));
    if (sortCol === 'title') return sortDir *  a.title.localeCompare(b.title);
    return sortDir * (Number(a.num) - Number(b.num));
  });

  const tbody  = document.getElementById('tbody');
  const nores  = document.getElementById('nores');
  const tbl    = document.getElementById('tbl');
  const rc     = document.getElementById('rc');
  const badge  = document.getElementById('badge');

  if (sorted.length === 0) {
    badge.textContent    = '0';
    tbl.style.display    = 'none';
    nores.style.display  = 'block';
    rc.textContent       = I18N[lang].rc(0, allGames.length);
    return;
  }

  nores.style.display  = 'none';
  tbl.style.display    = 'table';

  tbody.innerHTML = sorted.map(g => {
    const tags   = g.tags ? g.tags.split(',').map(t => t.trim()) : [];
    const isStar = g.star === 'true';
    const gcls   = 'gb-' + esc(g.genre || 'Adventure').replace(/[^a-zA-Z]/g, '');
    const tagsH  = tags.map(t =>
      `<span class="tag tag-${t}" data-tag="${t}">${tagLabel[t] || t}</span>`
    ).join('');
    const devLink = g.developer
      ? `<a href="https://duckduckgo.com/?q=${encodeURIComponent(g.developer + ' official website')}" target="_blank" rel="noopener noreferrer">${esc(g.developer)}</a>`
      : '';
    const pubLink = g.publisher
      ? `<a href="https://duckduckgo.com/?q=${encodeURIComponent(g.publisher + ' official website')}" target="_blank" rel="noopener noreferrer">${esc(g.publisher)}</a>`
      : '';
    const countryH = (g.country || '').split(/\s+/).filter(Boolean)
      .map(f => `<span title="${countryName[f] || f}" style="cursor:default;font-size:1.2em">${f}</span>`)
      .join(' ');
    const titleAttr = esc(g.title).replace(/"/g,'&quot;');
    return `<tr data-title="${titleAttr}">
      <td class="num">${g.num}</td>
      <td class="yr">${g.year}</td>
      <td class="ttl">${isStar ? '<span class="star">&#9733;</span>' : ''}${esc(g.title)}</td>
      <td class="gnr"><span class="gb ${gcls}">${esc(g.genre)}</span></td>
      <td class="tgs">${tagsH}</td>
      <td class="dev">${devLink}</td>
      <td class="pub">${pubLink}</td>
      <td class="cnt">${countryH}</td>
      <td class="nte">${esc(g.note || '')}</td>
      <td class="sc sc-mc-cell"><span class="sc-spin">В·В·В·</span></td>
    </tr>`;
  }).join('');

  // Count AFTER rendering вҖ” guarantees badge = actual rows
  const rowCount = tbody.rows.length;
  badge.textContent = rowCount;
  rc.textContent    = I18N[lang].rc(rowCount, allGames.length);

  tbody.querySelectorAll('.tag[data-tag]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); setFilter(el.dataset.tag); });
  });
  populateScores();
}

// в”Җв”Җ FILTER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  render();
  goTop();
}
document.querySelectorAll('.fb').forEach(b => b.addEventListener('click', () => setFilter(b.dataset.f)));

// в”Җв”Җ SEARCH в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim();
  render();
});

// в”Җв”Җ SORT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(h => {
      h.classList.remove('sorted');
      const si = h.querySelector('.si');
      if (si) si.innerHTML = '&#8597;';
    });
    th.classList.add('sorted');
    const si = th.querySelector('.si');
    if (si) si.innerHTML = sortDir === 1 ? '&#8595;' : '&#8593;';
    render();
    goTop();
  });
});

// в”Җв”Җ THEME (accent colour) CYCLE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(function() {
  const THEMES = [
    { accent: '#00ff88', glow: '0 0 8px #00ff8844, 0 0 20px #00ff8822' },  // green
    { accent: '#ff6b35', glow: '0 0 8px #ff6b3544, 0 0 20px #ff6b3522' },  // orange
    { accent: '#e8e8e8', glow: '0 0 8px #e8e8e844, 0 0 20px #e8e8e822' },  // white
  ];
  let idx = 2; // default: white
  function applyTheme(t) {
    const r = document.documentElement.style;
    r.setProperty('--accent',    t.accent);
    r.setProperty('--neon-glow', t.glow);
  }
  applyTheme(THEMES[idx]);
  document.getElementById('themeBtn').addEventListener('click', () => {
    idx = (idx + 1) % THEMES.length;
    applyTheme(THEMES[idx]);
  });
})();

// в”Җв”Җ LANGUAGE TOGGLE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('langBtn').addEventListener('click', () => {
  lang = lang === 'it' ? 'en' : 'it';
  localStorage.setItem('pixeldb-lang', lang);
  document.documentElement.lang = lang;
  activeFilter = 'all';
  document.querySelectorAll('.fb').forEach(b => b.classList.toggle('active', b.dataset.f === 'all'));
  query = '';
  document.getElementById('search').value = '';
  applyLang();
  loadCSV();
});

// в”Җв”Җ LOAD CSV в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function loadCSV() {
  const t = I18N[lang];
  const loading = document.getElementById('loading');
  const tbl     = document.getElementById('tbl');
  loading.textContent  = t.loading;
  loading.style.display = 'block';
  tbl.style.display     = 'none';

  fetch(t.csv)
    .then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
    .then(text => {
      allGames = parseCSV(text);
      loading.style.display = 'none';
      render();
    })
    .catch(() => {
      loading.textContent = t.loadErr;
    });
}

// в”Җв”Җ STICKY HEIGHT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function updateStickyOffsets() {
  const bar = document.querySelector('.filters');
  const h = bar ? bar.offsetHeight : 48;
  document.documentElement.style.setProperty('--filter-h', h + 'px');
}

// в”Җв”Җ SCROLL TO TOP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// After every sort/filter go to page top so no row is hidden under sticky bars
function goTop() { window.scrollTo({ top: 0, behavior: 'instant' }); }

// в”Җв”Җ AUDIO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  (function() {
    const audio = document.createElement('audio');
    audio.src    = 'z.mp3';
    audio.loop   = true;
    audio.volume = 0.45;
    // allow inline playback on mobile Safari / iOS
    audio.playsInline = true;
    audio.setAttribute('playsinline', '');
    audio.setAttribute('webkit-playsinline', '');

    const audioBtn = document.getElementById('audioToggle');

    const tryPlay = () => audio.play().then(() => {
      // hide fallback button if playing
      if (audioBtn) audioBtn.style.display = 'none';
    }).catch((err) => {
      // autoplay blocked: show a visible button so user can start audio manually
      if (audioBtn) {
        audioBtn.style.display = 'block';
        audioBtn.addEventListener('click', async function onClick() {
          try {
            await audio.play();
          } catch(e) {
            // if still failing, try unmuting after gesture
            audio.muted = false;
            await audio.play().catch(()=>{});
          }
          audioBtn.style.display = 'none';
        }, { once: true });
      }
    });

    // Try autoplay immediately
    tryPlay();

    // If autoplay initially blocked, ensure first touch/click will attempt to play
    const onFirstGesture = () => { tryPlay(); ['click','keydown','touchstart'].forEach(ev => document.removeEventListener(ev, onFirstGesture)); };
    ['click','keydown','touchstart'].forEach(ev => document.addEventListener(ev, onFirstGesture, { once: true }));
  })();

// в”Җв”Җ PIXEL-ART SUNSET (header background) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(function() {
  const canvas = document.getElementById('gol-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const PX = 4; // pixel art grid size

  // Sky colour bands, top вҶ’ bottom
  const SKY = [
    '#120820','#1a0c2e','#1e1040','#2a1450',
    '#3d1460','#5c2070','#7a2a70','#9a3268',
    '#b83c58','#cc4a40','#d96030','#e47228',
    '#ed8824','#f59c28','#f8b030','#fac040',
    '#fcd060','#fee080','#fff0a0'
  ];

  function fill(px2, py, col) {
    ctx.fillStyle = col;
    ctx.fillRect(px2 * PX, py * PX, PX, PX);
  }

  function drawSunset() {
    const W = canvas.width, H = canvas.height;
    const pw = Math.ceil(W / PX);
    const ph = Math.ceil(H / PX);

    // в”Җв”Җ sky bands в”Җв”Җ
    for (let py = 0; py < ph; py++) {
      const bi = Math.min(SKY.length - 1, Math.floor((py / ph) * SKY.length));
      ctx.fillStyle = SKY[bi];
      ctx.fillRect(0, py * PX, W, PX);
    }

    // в”Җв”Җ sun в”Җв”Җ
    const sx = Math.floor(pw / 2);
    const sy = Math.floor(ph * 0.70);
    const sr = Math.max(3, Math.floor(ph * 0.20));
    for (let dy = -sr; dy <= sr; dy++) {
      for (let dx = -sr; dx <= sr; dx++) {
        const d2 = dx * dx + dy * dy;
        if (d2 <= sr * sr) {
          const d = Math.sqrt(d2) / sr;
          const col = d < 0.25 ? '#fffff0'
                    : d < 0.55 ? '#fff5aa'
                    : d < 0.78 ? '#ffe066'
                    :            '#ffbb22';
          fill(sx + dx, sy + dy, col);
        }
      }
    }

    // в”Җв”Җ sun shimmer (vertical column, bottom half of sun downward) в”Җв”Җ
    for (let dy = 1; dy <= Math.floor(ph * 0.12); dy++) {
      const hw = Math.max(1, Math.floor((1 - dy / (ph * 0.13)) * 2));
      for (let dx = -hw; dx <= hw; dx++) {
        const col = dy % 2 === 0 ? '#ffd044' : '#ffbb22';
        if (sy + sr + dy < ph) fill(sx + dx, sy + sr + dy, col);
      }
    }

    // в”Җв”Җ clouds в”Җв”Җ
    const clouds = [
      { x: Math.floor(pw * 0.15), y: Math.floor(ph * 0.22), tiles: [[0,0],[1,0],[2,0],[3,0],[1,-1],[2,-1]] , col:'#d86888' },
      { x: Math.floor(pw * 0.58), y: Math.floor(ph * 0.16), tiles: [[0,0],[1,0],[2,0],[3,0],[4,0],[1,-1],[2,-1],[3,-1]] , col:'#c05850' },
      { x: Math.floor(pw * 0.80), y: Math.floor(ph * 0.26), tiles: [[0,0],[1,0],[2,0],[1,-1]] , col:'#b84460' },
    ];
    for (const cl of clouds) {
      for (const [tx, ty] of cl.tiles) fill(cl.x + tx, cl.y + ty, cl.col);
    }

    // в”Җв”Җ stars (deterministic) в”Җв”Җ
    const starZone = Math.floor(ph * 0.42);
    for (let i = 0; i < 28; i++) {
      const spx = (i * 137 + 29) % pw;
      const spy = (i * 71  + 13) % starZone;
      // only in the dark upper sky (skip the orange lower bands)
      const bi  = Math.min(SKY.length - 1, Math.floor((spy / ph) * SKY.length));
      if (bi < 8) fill(spx, spy, i % 4 === 0 ? '#ffffff' : '#ffeecc');
    }

    // в”Җв”Җ ground silhouette в”Җв”Җ
    const groundTop = Math.floor(ph * 0.80);
    for (let px2 = 0; px2 < pw; px2++) {
      // gentle undulating hills
      const bump = Math.round(
        3 * Math.sin(px2 * 0.09) +
        2 * Math.sin(px2 * 0.19 + 0.8) +
        1.5 * Math.sin(px2 * 0.05 + 1.6)
      );
      const top = groundTop - bump;
      for (let py = top; py < ph; py++) {
        const col = py === top ? '#2a1840' : (py < top + 2 ? '#1e1030' : '#130a20');
        fill(px2, py, col);
      }
    }

    // в”Җв”Җ pine-tree silhouettes в”Җв”Җ
    const treeH = Math.max(5, Math.floor(ph * 0.30));
    const trees = [
      Math.floor(pw * 0.08), Math.floor(pw * 0.14),
      Math.floor(pw * 0.76), Math.floor(pw * 0.83), Math.floor(pw * 0.89),
    ];
    for (let ti = 0; ti < trees.length; ti++) {
      const tx = trees[ti];
      const th = treeH - (ti % 2) * 2;
      const baseY = groundTop - Math.round(
        3 * Math.sin(tx * 0.09) + 2 * Math.sin(tx * 0.19 + 0.8)
      ) - 1;
      for (let lv = 0; lv < th; lv++) {
        const hw = Math.max(0, Math.floor(((lv / th) * 2.8)));
        const py = baseY - lv;
        for (let dx = -hw; dx <= hw; dx++) fill(tx + dx, py, '#0e0820');
      }
      fill(tx, baseY + 1, '#0e0820');
    }
  }

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    drawSunset();
  }

  window.addEventListener('resize', resize);
  requestAnimationFrame(resize);
})();

// в”Җв”Җ SCORES (Metacritic via allorigins.win proxy) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const SCORE_CACHE_KEY = 'pixeldb-scores-v4';
const SCORE_TTL = 7 * 24 * 3600 * 1000;
let scoreQueue = [];
let scoreFetching = false;

function scoreCache() {
  try { return JSON.parse(localStorage.getItem(SCORE_CACHE_KEY) || '{}'); } catch { return {}; }
}
function scoreCacheSave(c) {
  try { localStorage.setItem(SCORE_CACHE_KEY, JSON.stringify(c)); } catch {}
}
function scoreBadge(val) {
  const cls = val >= 75 ? 'sc-good' : val >= 50 ? 'sc-mid' : 'sc-bad';
  return `<span class="sc-badge ${cls}">${val}</span>`;
}
function scoreRender(cell, val) {
  if (!cell?.isConnected) return;
  cell.innerHTML = (val === null || val === undefined)
    ? '<span class="sc-na">вҖ”</span>'
    : scoreBadge(val);
}
function mcSlug(title) {
  // Wikipedia page title: preserve capitalisation, replace spaces with underscores
  return title.trim().replace(/\s+/g, '_');
}
function populateScores() {
  const cache = scoreCache();
  const now = Date.now();
  scoreQueue = [];
  document.querySelectorAll('tr[data-title]').forEach(tr => {
    const title  = tr.dataset.title;
    const mcCell = tr.querySelector('.sc-mc-cell');
    const entry  = cache[title];
    if (entry && (now - entry.ts) < SCORE_TTL) {
      scoreRender(mcCell, entry.mc);
    } else {
      scoreQueue.push({ title, mcCell });
    }
  });
  scoreDrain();
}
function scoreDrain() {
  if (scoreFetching || scoreQueue.length === 0) return;
  scoreFetching = true;
  const item = scoreQueue.shift();
  scoreFetchOne(item).finally(() => {
    scoreFetching = false;
    // 2s between requests to stay well within Wikipedia rate limits
    setTimeout(scoreDrain, 2000);
  });
}
async function scoreFetchOne({ title, mcCell }) {
  const cache = scoreCache();
  const entry = { ts: Date.now(), mc: null };
  try {
    // 1. Search Wikipedia for the game article
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search` +
      `&srsearch=${encodeURIComponent(title + ' video game')}&srlimit=3&format=json&origin=*`;
    const sr = await fetch(searchUrl, { signal: AbortSignal.timeout(8000) });
    if (sr.status === 429) throw new Error('rate-limited');
    const sd = await sr.json();
    const hit = sd.query?.search?.[0];
    if (!hit) throw new Error('no result');

    // 2. Fetch wikitext of the article
    const wtUrl = `https://en.wikipedia.org/w/api.php?action=parse&page=` +
      `${encodeURIComponent(hit.title)}&prop=wikitext&format=json&origin=*`;
    const wr = await fetch(wtUrl, { signal: AbortSignal.timeout(8000) });
    if (wr.status === 429) throw new Error('rate-limited');
    const wd = await wr.json();
    const wikitext = wd.parse?.wikitext?.['*'] || '';

    // 3. Extract MC field: grab everything between | MC = and the next field/close
    const mcField = wikitext.match(/\|\s*MC\s*=([\s\S]*?)(?=\n\s*[|}\]])/);
    if (mcField) {
      let val = mcField[1];
      // Strip wiki templates like {{abbr|NS|Nintendo Switch}} (may contain | inside)
      val = val.replace(/\{\{[^{}]*\}\}/g, '');
      // Collect all NN/100 or NNN/100 patterns, take the highest
      const allScores = [...val.matchAll(/(\d{2,3})\/100/g)]
        .map(m => parseInt(m[1], 10))
        .filter(v => v >= 1 && v <= 100);
      if (allScores.length > 0) {
        entry.mc = Math.max(...allScores);
      } else {
        // Fallback: first 2-3 digit standalone number
        const nm = val.match(/(\d{2,3})/);
        if (nm) {
          const v = parseInt(nm[1], 10);
          if (v >= 1 && v <= 100) entry.mc = v;
        }
      }
    }
  } catch {}
  cache[title] = entry;
  scoreCacheSave(cache);
  scoreRender(mcCell, entry.mc);
}
